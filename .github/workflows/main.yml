name: Build Android APK from Direct ZIP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Clean & Unzip Project File
      run: |
        unzip -o *.zip
        if [ -d "app" ] || [ -f "build.gradle.kts" ] || [ -f "build.gradle" ]; then
          echo "Files are already in root."
        else
          echo "Fixing folder structure..."
          mv */* . 2>/dev/null || true
          mv */.* . 2>/dev/null || true
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle 9.3.1
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1

    - name: Rewrite MockRepository Cleanly
      run: |
        # ফাইলটি ইনজেক্ট না করে একদম শুরু থেকে ফ্রেশ ও সঠিক সিনট্যাক্সে রাইট করা হচ্ছে
        # এতে 'Imports are only allowed in the beginning' এরর আর আসার কোনো সুযোগ নেই
        TARGET_FILE=$(find . -name "MockRepository.kt" -type f | head -n 1)
        if [ ! -z "$TARGET_FILE" ]; then
          echo "Rewriting $TARGET_FILE with exact syntax..."
          cat << 'EOF' > "$TARGET_FILE"
        package com.abm.erp.data

        // Missing Data Models Definitions
        data class ApprovalRequestEntity(var id: String = "", var type: String = "", var status: String = "", var assignee: String = "", var done: Boolean = false, var createdAtEpochMillis: Long = 0, var fromEmployee: String = "", var detail: String = "")
        data class CourierPartnerEntity(var id: String = "", var name: String = "", var hasApi: Boolean = false)
        data class ShipmentEntity(var id: String = "", var courierId: String = "", var dealerOrRetailer: String = "", var trackingId: String = "", var status: String = "")

        class MockRepository {
            // Needed to prevent TaskManagerScreen from breaking
            fun getApprovalRequests(): List<ApprovalRequestEntity> = emptyList()
            fun getCourierPartners(): List<CourierPartnerEntity> = emptyList()
            fun getShipments(): List<ShipmentEntity> = emptyList()
        }
        EOF
          echo "MockRepository successfully recreated with correct package and structure."
        else
          echo "MockRepository.kt not found, skipping."
        fi

    - name: Create Ultimate Gradle Init Script
      run: |
        cat << 'EOF' > init.gradle
        allprojects {
            gradle.projectsEvaluated {
                tasks.withType(JavaCompile).configureEach {
                    sourceCompatibility = "17"
                    targetCompatibility = "17"
                }
                tasks.configureEach { task ->
                    if (task.class.name.contains("KotlinCompile") || task.class.name.contains("Ksp")) {
                        try {
                            task.compilerOptions.jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
                        } catch (Exception e) {
                            try {
                                task.jvmTarget = "17"
                            } catch (Exception e2) {}
                        }
                    }
                }
            }
        }
        EOF
        
        echo "GRADLE_OPTS=-Djava.awt.headless=true -Dorg.gradle.jvmargs=\"-Xmx2048m -Djava.awt.headless=true\"" >> $GITHUB_ENV
        echo "systemProp.java.awt.headless=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Djava.awt.headless=true -Xmx2048m" >> gradle.properties
        echo "kotlin.daemon.jvmargs=-Djava.awt.headless=true" >> gradle.properties

    - name: Smart Debug Keystore Generation
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        REPO_NAME=$(basename $GITHUB_REPOSITORY)
        mkdir -p ../$REPO_NAME
        cp debug.keystore ../$REPO_NAME/debug.keystore || true
        mkdir -p app
        cp debug.keystore app/debug.keystore || true

    - name: Build Debug APK with Init Script
      run: |
        gradle :app:assembleDebug --no-daemon \
          --init-script init.gradle \
          -Pandroid.skipGoogleServicesPlugin=true \
          -Djava.awt.headless=true
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Claude-Ultimate-Fixed-APK
        path: |
          **/build/outputs/apk/debug/*.apk
