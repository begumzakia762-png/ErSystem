name: Build Android APK from Direct ZIP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Clean & Unzip Project File
      run: |
        unzip -o *.zip
        if [ -d "app" ] || [ -f "build.gradle.kts" ] || [ -f "build.gradle" ]; then
          echo "Files are already in root."
        else
          echo "Fixing folder structure..."
          mv */* . 2>/dev/null || true
          mv */.* . 2>/dev/null || true
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle 9.3.1
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1

    - name: Deep Hardcoded Java 17 Replacement
      run: |
        # গ্লোবাল হেডলেস এনভায়রনমেন্ট
        echo "GRADLE_OPTS=-Djava.awt.headless=true -Dorg.gradle.jvmargs=\"-Xmx2048m -Djava.awt.headless=true\"" >> $GITHUB_ENV
        echo "systemProp.java.awt.headless=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Djava.awt.headless=true -Xmx2048m" >> gradle.properties
        echo "kotlin.daemon.jvmargs=-Djava.awt.headless=true" >> gradle.properties
        
        # গ্রেডল ও কোটলিন ফাইলের ভেতরে জাভা ৮ এর সব নামনিশানা মুছে ১৭ করা হচ্ছে
        find . -type f \( -name "*.gradle" -o -name "*.kts" -o -name "*.toml" -o -name "*.properties" \) -exec sed -i 's/1\.8/17/g' {} +
        find . -type f \( -name "*.gradle" -o -name "*.kts" -o -name "*.toml" -o -name "*.properties" \) -exec sed -i 's/VERSION_1_8/VERSION_17/g' {} +
        find . -type f \( -name "*.gradle" -o -name "*.kts" -o -name "*.toml" -o -name "*.properties" \) -exec sed -i 's/JavaVersion\.VERSION_1_8/JavaVersion\.VERSION_17/g' {} +

    - name: Smart Debug Keystore Generation
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        REPO_NAME=$(basename $GITHUB_REPOSITORY)
        mkdir -p ../$REPO_NAME
        cp debug.keystore ../$REPO_NAME/debug.keystore || true
        mkdir -p app
        cp debug.keystore app/debug.keystore || true

    - name: Build Debug APK
      run: |
        gradle :app:assembleDebug --no-daemon -Pandroid.skipGoogleServicesPlugin=true -Djava.awt.headless=true
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Claude-Ultimate-BruteForce-APK
        path: |
          **/build/outputs/apk/debug/*.apk
