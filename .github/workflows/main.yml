name: Build Android APK from Direct ZIP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Clean & Unzip Project File
      run: |
        unzip -o *.zip
        if [ -d "app" ] || [ -f "build.gradle.kts" ] || [ -f "build.gradle" ]; then
          echo "Files are already in root."
        else
          echo "Fixing folder structure..."
          mv */* . 2>/dev/null || true
          mv */.* . 2>/dev/null || true
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle 9.3.1
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1

    - name: Force Global Java 17 via Environment & Options
      run: |
        # গ্লোবাল হেডলেস মোড
        echo "GRADLE_OPTS=-Djava.awt.headless=true -Dorg.gradle.jvmargs=\"-Xmx2048m -Djava.awt.headless=true\"" >> $GITHUB_ENV
        echo "systemProp.java.awt.headless=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Djava.awt.headless=true -Xmx2048m" >> gradle.properties
        echo "kotlin.daemon.jvmargs=-Djava.awt.headless=true" >> gradle.properties
        
        # গ্রেডল প্রোপার্টিজ ফাইলে কোটলিন ও জাভা টার্গেট ১৭ ফোর্স করা (যাতে ফাইলের কোড যাই থাকুক, এটা মেইন প্রায়োরিটি পায়)
        echo "kotlin.jvm.target=17" >> gradle.properties
        echo "android.experimental.ksp.enable=false" >> gradle.properties

    - name: Smart Debug Keystore Generation
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        REPO_NAME=$(basename $GITHUB_REPOSITORY)
        mkdir -p ../$REPO_NAME
        cp debug.keystore ../$REPO_NAME/debug.keystore || true
        mkdir -p app
        cp debug.keystore app/debug.keystore || true

    - name: Force Re-compile with Java 17 (Ultimate Direct Fix)
      run: |
        # এখানে আমরা গ্রেডলের সমস্ত টাস্কের ব্যাকএন্ড অপশনে জাভা ১৭ ইনজেক্ট করে দিচ্ছি
        gradle :app:assembleDebug --no-daemon \
          -Pandroid.skipGoogleServicesPlugin=true \
          -Djava.awt.headless=true \
          -Dorg.gradle.java.home=$JAVA_HOME_17_X64 \
          -Pkotlin.jvm.target=17 \
          -Pandroid.compileOptions.sourceCompatibility=VERSION_17 \
          -Pandroid.compileOptions.targetCompatibility=VERSION_17 \
          -Pksp.allow.inconsistent.jvm.target=true
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Claude-Ultimate-Forced-APK
        path: |
          **/build/outputs/apk/debug/*.apk
