name: Build Android APK (Internal Java 8 Force)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Clean & Unzip Project File
      run: |
        unzip -o *.zip
        if [ -d "app" ] || [ -f "build.gradle.kts" ] || [ -f "build.gradle" ]; then
          echo "Files are already in root."
        else
          echo "Fixing folder structure..."
          mv */* . 2>/dev/null || true
          mv */.* . 2>/dev/null || true
        fi

    - name: Set up JDK 17 (Required for Tools)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' # টুলস চলার জন্য মেইন জাভা ১৭-ই রাখলাম

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle 9.3.1
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1

    - name: Force Java 8 via Compiler Args & Headless Mode
      run: |
        # গ্লোবাল হেডলেস মোড
        echo "GRADLE_OPTS=-Djava.awt.headless=true -Dorg.gradle.jvmargs=\"-Xmx2048m -Djava.awt.headless=true\"" >> $GITHUB_ENV
        echo "systemProp.java.awt.headless=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Djava.awt.headless=true -Xmx2048m" >> gradle.properties
        echo "kotlin.daemon.jvmargs=-Djava.awt.headless=true" >> gradle.properties
        
        # গ্রেডল প্রোপার্টিজে কোটলিন টার্গেটকে ইন্টারনালি ১.৮ ফোর্স করা
        echo "kotlin.jvm.target=1.8" >> gradle.properties

    - name: Smart Debug Keystore Generation
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        REPO_NAME=$(basename $GITHUB_REPOSITORY)
        mkdir -p ../$REPO_NAME
        cp debug.keystore ../$REPO_NAME/debug.keystore || true
        mkdir -p app
        cp debug.keystore app/debug.keystore || true

    - name: Build Debug APK with Forced Java 8 Target
      run: |
        # কম্পাইলারকে স্পষ্টভাবে বলে দেওয়া হচ্ছে ক্লদের কোড অনুযায়ী জাভা ১.৮-এ কম্পাইল করতে
        gradle :app:assembleDebug --no-daemon \
          -Pandroid.skipGoogleServicesPlugin=true \
          -Djava.awt.headless=true \
          -Pkotlin.jvm.target=1.8 \
          -Pandroid.compileOptions.sourceCompatibility=1.8 \
          -Pandroid.compileOptions.targetCompatibility=1.8
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Claude-Forced-Java8-APK
        path: |
          **/build/outputs/apk/debug/*.apk
